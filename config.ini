[colors]
background = #4444FFA4
foreground = #eeeeff
primary = #e0b674
alert = #A54242

[bar/mybar]
width = 99%
offset-x = 0.5%
offset-y = 3
override-redirect = true
wm-restack = bspwm
height = 24
background = ${colors.background}
foreground = ${colors.foreground}
border-size = 2
border-color = #4f4fff11
radius = 7
module-margin = 1
padding = 1

font-0 = CaskaydiaCove Nerd Font:size=10;2
font-1 = JetBrainsMonoNL Nerd Font:size=10;2

modules-left = krunner bspwm
modules-center = time
modules-right = battery temperature memory date power

[module/time]
type = internal/date
interval = 1
time = %H:%M
label = %time%
padding = 5

[module/date]
type = internal/date
interval = 3600
date = %d-%m-%Y
padding = 5

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU: "
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM: "
label = %percentage_used%%

[module/temperature]
type = custom/script
exec = ~/.config/polybar/scripts/temp-cycle
interval = 2
click-left = ~/.config/polybar/scripts/temp-click

[module/battery]
type = internal/battery
polling-interval = 3
time-format = %H:%M
battery = BAT0
adapter = ADP1
low-at = 5
full-at = 95
label-charging = %percentage%% 󰂄 (%time%)
format-discharging = <label-discharging> <ramp-capacity>
label-discharging = %percentage%%
label-full = %percentage%% 󰁹
label-low = %percentage%% 󰂃
ramp-capacity-0 = 󰂃
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰂂

[module/network]
type = internal/network
interface = wlo1
interface-type = wireless
interval = 5

[module/bspwm]
type = internal/bspwm
label-focused = %index%
label-unfocused = %index%
label-occupied = %index%
label-urgent = %index%
label-empty = %index%
label-focused-foreground = #FFFFFF
label-focused-background = #4242E8
label-padding = 1
label-separator = |
label-separator-padding = 1


[module/krunner]
type = custom/text
padding = 0
format = 
click-left = krunner &

[module/power]
type = custom/text
format = 
click-left = exec /home/hannese/Documents/Scripts/power_script.py &
